<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Crop/Growth Gradient -->
    <linearGradient id="cropGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="70%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Yield Chart Gradient -->
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glowing Lines -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3" />
    </pattern>
  </defs>

  <style>
    /* CSS Animations for Dynamic Aspects */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes grow {
      0% { transform: scaleY(0.85); }
      100% { transform: scaleY(1.05); }
    }
    @keyframes rotateSat {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(3deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulseSignal {
      0% { r: 5; opacity: 0.9; }
      100% { r: 40; opacity: 0; }
    }

    /* Applying Animations */
    .animated-float {
      animation: float 6s ease-in-out infinite;
    }
    .animated-pulse {
      animation: pulse 3s ease-in-out infinite;
    }
    .animated-dash {
      stroke-dasharray: 8, 4;
      animation: dash 2s linear infinite;
    }
    .animated-grow {
      transform-origin: bottom;
      animation: grow 4s ease-in-out infinite alternate;
    }
    .satellite-container {
      transform-origin: 1050px 80px;
      animation: rotateSat 8s ease-in-out infinite;
    }
    .signal-wave {
      transform-origin: 1050px 80px;
      animation: pulseSignal 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Abstract Yield Simulator Elements -->

  <!-- 1. The Yield Curve / Chart (Data / Statistical aspect) -->
  <path d="M 0 350 Q 200 300 400 320 T 800 220 T 1200 180 L 1200 400 L 0 400 Z" fill="url(#chartGrad)" />
  <path d="M 0 350 Q 200 300 400 320 T 800 220 T 1200 180" fill="none" stroke="url(#lineGrad)" stroke-width="4" />

  <!-- Glowing Nodes on the yield curve -->
  <g class="animated-pulse">
    <circle cx="400" cy="320" r="6" fill="#3b82f6" filter="drop-shadow(0 0 8px #3b82f6)" />
    <circle cx="800" cy="220" r="6" fill="#10b981" filter="drop-shadow(0 0 8px #10b981)" />
    <circle cx="1000" cy="200" r="6" fill="#f59e0b" filter="drop-shadow(0 0 8px #f59e0b)" />
  </g>

  <!-- 2. Stylized Crops (Mechanistic / Agricultural aspect) -->
  <!-- Crop Row 1 -->
  <g class="animated-grow" style="animation-delay: 0s;">
    <path d="M 150 400 L 150 280 C 140 260 120 250 110 250 C 130 245 145 255 150 270 C 155 255 170 245 190 250 C 180 250 160 260 150 280 Z" fill="url(#cropGrad)" />
    <path d="M 280 400 L 280 290 C 270 270 250 260 240 260 C 260 255 275 265 280 280 C 285 265 300 255 320 260 C 310 260 290 270 280 290 Z" fill="url(#cropGrad)" />
    <path d="M 420 400 L 420 270 C 410 250 390 240 380 240 C 400 235 415 245 420 260 C 425 245 440 235 460 240 C 450 240 430 250 420 270 Z" fill="url(#cropGrad)" />
  </g>

  <!-- Crop Row 2 (Delayed animation for natural wave effect) -->
  <g class="animated-grow" style="animation-delay: -1.5s;">
    <path d="M 210 400 L 210 310 C 200 295 185 285 175 285 C 195 280 205 290 210 300 C 215 290 225 280 245 285 C 235 285 220 295 210 310 Z" fill="url(#cropGrad)" opacity="0.8"/>
    <path d="M 350 400 L 350 300 C 340 285 325 275 315 275 C 335 270 345 280 350 290 C 355 280 365 270 385 275 C 375 275 360 285 350 300 Z" fill="url(#cropGrad)" opacity="0.8"/>
    <path d="M 490 400 L 490 320 C 480 305 465 295 455 295 C 475 290 485 300 490 310 C 495 300 505 290 525 295 C 515 295 500 305 490 320 Z" fill="url(#cropGrad)" opacity="0.8"/>
  </g>

  <!-- 3. Remote Sensing Satellite & Signal (Observation aspect) -->
  <!-- Signal Pulsations -->
  <circle cx="1050" cy="80" r="10" fill="none" stroke="#10b981" stroke-width="2" class="signal-wave" style="animation-delay: 0s;" />
  <circle cx="1050" cy="80" r="10" fill="none" stroke="#3b82f6" stroke-width="2" class="signal-wave" style="animation-delay: 0.6s;" />
  <circle cx="1050" cy="80" r="10" fill="none" stroke="#f59e0b" stroke-width="2" class="signal-wave" style="animation-delay: 1.2s;" />

  <!-- Dotted satellite scanning beam -->
  <line x1="1050" y1="80" x2="800" y2="220" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6" class="animated-dash" />
  <line x1="1050" y1="80" x2="1000" y2="200" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6" class="animated-dash" />

  <!-- Satellite Body -->
  <g class="satellite-container">
    <g transform="translate(1010, 50)">
      <!-- Solar Panels -->
      <rect x="0" y="25" width="30" height="12" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" rx="2" />
      <rect x="50" y="25" width="30" height="12" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1" rx="2" />
      <line x1="30" y1="31" x2="50" y2="31" stroke="#94a3b8" stroke-width="2" />
      <!-- Central Body -->
      <rect x="33" y="18" width="14" height="26" fill="#cbd5e1" rx="2" />
      <!-- Instrument dish -->
      <path d="M 33 44 C 33 48, 47 48, 47 44 Z" fill="#64748b" />
      <line x1="40" y1="44" x2="40" y2="50" stroke="#475569" stroke-width="1.5" />
    </g>
  </g>

  <!-- 4. Text and Titles -->
  <g class="animated-float">
    <!-- Main Title -->
    <text x="80" y="160" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-1">
      Awesome Agricultural Yield Simulator
    </text>
    <!-- Subtitle / Topic -->
    <text x="80" y="210" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#10b981">
      Interview Questions &amp; Prep Guide
    </text>
    <!-- Badges / Tech Stack indicators -->
    <g transform="translate(80, 240)">
      <!-- Tag 1: Mechanistic Modeling -->
      <rect x="0" y="0" width="160" height="28" rx="14" fill="#334155" />
      <text x="80" y="18" font-family="system-ui" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">Mechanistic Models</text>

      <!-- Tag 2: Machine Learning -->
      <rect x="170" y="0" width="130" height="28" rx="14" fill="#334155" />
      <text x="235" y="18" font-family="system-ui" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Machine Learning</text>

      <!-- Tag 3: Remote Sensing -->
      <rect x="310" y="0" width="130" height="28" rx="14" fill="#334155" />
      <text x="375" y="18" font-family="system-ui" font-size="12" font-weight="600" fill="#10b981" text-anchor="middle">Remote Sensing</text>
    </g>
  </g>

</svg>
